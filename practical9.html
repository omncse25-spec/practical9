
<!DOCTYPE html>
<html>
<head>
    <title>My Webpage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Roboto;
            margin: 0;
            background-color: #f2f2f2;
        }
        header {
            background: teal;
            color: white;
            text-align: center;
            padding: 15px;
        }
        nav {
            background: #333;
            text-align: center;
        }
        nav a {
            color: white;
            padding: 10px;
            display: inline-block;
            text-decoration: none;
        }
        nav a:hover {
            background: gray;
        }
        .content {
            column-count: 3;
            padding: 15px;
        }
        .box {
            background: white;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            display: inline-block;
            width: 100%;
            transition: 0.3s;
        }
        .box:hover {
            transform: scale(1.05);
        }
        i {
            color: teal;
            font-size: 25px;
        }
        @keyframes show {
            from {opacity: 0;}
            to {opacity: 1;}
        }
        .box {
            animation: show 1s;
        }
        footer {
            text-align: center;
            background: #333;
            color: white;
            padding: 10px;
        }
        @media (max-width: 800px) {
            .content {
                column-count: 2;
            }
        }
        @media (max-width: 500px) {
            .content {
                column-count: 1;
            }
        }
    </style>
</head>
<body>
<header>
    <h2>My Website</h2>
<h2>OM NIPANE CS25158</h2>
</header>
<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>
<div class="content">
    <div class="box">
        <i class="fas fa-laptop"></i>
        <h3>Tech</h3>
        <p>This is a simple webpage using CSS3 features.</p>
    </div>
    <div class="box">
        <i class="fas fa-mobile"></i>
        <h3>Responsive</h3>
        <p>It adjusts based on screen size.</p>
    </div>
    <div class="box">
        <i class="fas fa-star"></i>
        <h3>Design</h3>
        <p>Includes animation and hover effects.</p>
    </div>
</div>

<footer>
    <p>My Website 2026</p>
</footer>

</body>
</html>
